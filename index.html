<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Portfolio Hero</title>
    <!-- Tailwind CSS Script for rapid prototyping -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for the stark modern sans and elegant editorial serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D0D0D;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-6 overflow-hidden selection:bg-white/20">

    <!-- Top Navigation Layer -->
    <header class="w-full max-w-7xl mx-auto flex items-center justify-between z-50 fixed top-6 left-1/2 -translate-x-1/2 px-6">
        <!-- Brand identity -->
        <div class="flex flex-col">
            <span class="font-medium tracking-tight text-sm">Your Name</span>
            <span class="text-xs text-neutral-500">Product Designer</span>
        </div>

        <!-- Centered Glassmorphic Navigation Pill -->
        <nav class="bg-neutral-900/40 backdrop-blur-md border border-white/5 rounded-full p-1 flex items-center shadow-2xl shadow-black/50">
            <a href="#work" class="px-5 py-1.5 text-xs font-medium bg-white/10 rounded-full transition-all duration-200 shadow-inner">Work</a>
            <a href="#info" class="px-5 py-1.5 text-xs font-medium text-neutral-400 hover:text-white transition-all duration-200">Info</a>
        </nav>

        <!-- Right utility links -->
        <div class="flex items-center gap-6 text-xs text-neutral-400 font-medium">
            <a href="#" class="hover:text-white transition-colors duration-200 flex items-center gap-0.5">LinkedIn <span class="text-[10px]">↗</span></a>
            <a href="#" class="hover:text-white transition-colors duration-200 flex items-center gap-0.5">Resume <span class="text-[10px]">↗</span></a>
        </div>
    </header>

    <!-- Main Hero Workspace -->
    <main class="flex-1 flex items-center justify-center pt-24 pb-12 w-full max-w-5xl mx-auto px-4">
        
        <!-- Premium Mockup Window Container -->
        <div class="w-full bg-gradient-to-b from-neutral-900/80 to-neutral-950/90 border border-neutral-800 rounded-xl aspect-[16/10] max-h-[580px] shadow-2xl shadow-black/80 flex flex-col overflow-hidden relative group">
            
            <!-- Window Header (Mac Controls) -->
            <div class="flex items-center justify-between px-4 py-3 border-b border-white/[0.03] bg-neutral-900/30">
                <div class="flex items-center gap-1.5">
                    <div class="w-3 h-3 rounded-full bg-[#FF5F56]/80"></div>
                    <div class="w-3 h-3 rounded-full bg-[#FFBD2E]/80"></div>
                    <div class="w-3 h-3 rounded-full bg-[#27C93F]/80"></div>
                </div>
                <div class="text-neutral-700 font-light text-xl pointer-events-none">+</div>
            </div>

            <!-- Internal Canvas Content Layout -->
            <div class="flex-1 flex flex-col justify-between p-8 md:p-14 relative z-10">
                <!-- Main Value Statement -->
                <h1 class="text-4xl md:text-6xl font-light tracking-tight max-w-3xl leading-[1.15]">
                    I craft products, interactions & <span class="serif-font italic text-neutral-300 drop-shadow-[0_0_25px_rgba(255,255,255,0.15)]">stories.</span>
                </h1>

                <!-- Secondary Context Details & Indicator -->
                <div class="flex flex-col md:flex-row items-end justify-between gap-6">
                    <!-- Anchor context info -->
                    <div class="text-xs md:text-sm text-neutral-400 max-w-xs leading-relaxed space-y-1">
                        <p class="text-neutral-200">Designer at [Company]. Based in [City].</p>
                        <p class="text-neutral-500">Formerly at TechCorp and StudioX.</p>
                    </div>

                    <!-- Micro Scroll Arrow -->
                    <div class="text-neutral-500 text-lg animate-bounce mr-2 hidden md:block">
                        ↓
                    </div>
                </div>
            </div>

            <!-- Ambient background glow behind text inside container -->
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_40%_40%,rgba(255,255,255,0.03),transparent_60%)] pointer-events-none"></div>
        </div>
        
    </main>

    <!-- Footer Space Holder -->
    <footer class="w-full text-center py-2 text-[10px] text-neutral-600 pointer-events-none">
        &copy; 2026 &bull; Designed for impact.
    </footer>

</body>
</html>
